    const s=document.createElement('script');

    setTimeout(()=>{ fetch(W+'?test='+name+'&r=timeout'); resolve(); }, 4000);
  });
}

  await tryURL('plain_main', 'http://127.0.0.1:1337/static/js/main.js');

})();
</script>
